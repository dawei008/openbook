<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenBook Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --w: 1600px;
    --h: 2240px;
    --bg: #FAFAF8;
    --ink: #1A1A18;
    --warm: #B8510D;
    --teal: #1A6B5C;
    --stone: #8A8578;
    --line: #E0DDD6;
    --cream: #F0EDE6;
  }

  body {
    background: #E8E6E0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .cover {
    width: var(--w);
    height: var(--h);
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* === TOP THIRD: Title area === */
  .top {
    padding: 120px 120px 80px;
    flex-shrink: 0;
  }

  .series-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--warm);
    margin-bottom: 48px;
  }

  .title-en {
    font-family: 'IBM Plex Serif', serif;
    font-size: 120px;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.0;
    letter-spacing: -3px;
    margin-bottom: 32px;
  }

  .title-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 52px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.5;
    letter-spacing: 2px;
  }

  .title-zh .accent {
    color: var(--warm);
  }

  /* === MIDDLE: Visual element === */
  .visual {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 120px;
    position: relative;
  }

  /* The diagram: abstract harness structure */
  .diagram {
    width: 100%;
    max-width: 1100px;
    position: relative;
  }

  .diagram svg {
    width: 100%;
    height: auto;
  }

  /* === BOTTOM: Equation + metadata === */
  .bottom {
    padding: 0 120px 100px;
    flex-shrink: 0;
  }

  .equation {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    color: var(--stone);
    letter-spacing: 2px;
    margin-bottom: 48px;
    padding-bottom: 40px;
    border-bottom: 1px solid var(--line);
  }

  .equation .eq-agent {
    color: var(--ink);
    font-weight: 500;
  }

  .equation .eq-harness {
    color: var(--warm);
    font-weight: 500;
  }

  .tagline {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--stone);
    line-height: 1.8;
    margin-bottom: 56px;
  }

  .tagline strong {
    color: var(--ink);
    font-weight: 500;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .topics {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .topic {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--teal);
    padding: 8px 16px;
    border: 1px solid var(--teal);
    border-radius: 2px;
  }

  .stats {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--stone);
    text-align: right;
    line-height: 2;
    letter-spacing: 1px;
  }

  .stats .num {
    color: var(--ink);
    font-weight: 500;
  }

  /* === Spine accent === */
  .spine {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 12px;
    background: var(--warm);
  }
</style>
</head>
<body>

<div class="cover">
  <!-- Spine color bar -->
  <div class="spine"></div>

  <!-- TOP: Title -->
  <div class="top">
    <div class="series-label">Harness Engineering</div>
    <div class="title-en">OpenBook</div>
    <div class="title-zh">
      构建 AI Agent 的<br><span class="accent">Harness</span> 工程学
    </div>
  </div>

  <!-- MIDDLE: Abstract harness diagram -->
  <div class="visual">
    <div class="diagram">
      <svg viewBox="0 0 1100 620" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Central core: LLM -->
        <rect x="430" y="220" width="240" height="180" rx="4" stroke="#1A1A18" stroke-width="2" fill="#FAFAF8"/>
        <text x="550" y="295" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="32" font-weight="500" fill="#1A1A18">LLM</text>
        <text x="550" y="330" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#8A8578" letter-spacing="2">REASONING CORE</text>

        <!-- Harness wrapper box -->
        <rect x="80" y="40" width="940" height="540" rx="4" stroke="#B8510D" stroke-width="1.5" stroke-dasharray="8 4" fill="none"/>
        <text x="100" y="30" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#B8510D" letter-spacing="3">HARNESS</text>

        <!-- Top row: Tools, Permissions, Prompt -->
        <rect x="140" y="80" width="180" height="80" rx="3" stroke="#1A6B5C" stroke-width="1.2" fill="#F0EDE6"/>
        <text x="230" y="118" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#1A6B5C" letter-spacing="1">TOOLS</text>
        <text x="230" y="140" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#8A8578">40+ registered</text>

        <rect x="460" y="80" width="180" height="80" rx="3" stroke="#1A6B5C" stroke-width="1.2" fill="#F0EDE6"/>
        <text x="550" y="118" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#1A6B5C" letter-spacing="1">PERMISSIONS</text>
        <text x="550" y="140" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#8A8578">4-layer defense</text>

        <rect x="780" y="80" width="180" height="80" rx="3" stroke="#1A6B5C" stroke-width="1.2" fill="#F0EDE6"/>
        <text x="870" y="118" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#1A6B5C" letter-spacing="1">PROMPT</text>
        <text x="870" y="140" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#8A8578">dynamic assembly</text>

        <!-- Bottom row: Memory, Multi-Agent, Extensions -->
        <rect x="140" y="460" width="180" height="80" rx="3" stroke="#1A6B5C" stroke-width="1.2" fill="#F0EDE6"/>
        <text x="230" y="498" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#1A6B5C" letter-spacing="1">MEMORY</text>
        <text x="230" y="520" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#8A8578">5-layer + Dream</text>

        <rect x="460" y="460" width="180" height="80" rx="3" stroke="#1A6B5C" stroke-width="1.2" fill="#F0EDE6"/>
        <text x="550" y="498" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#1A6B5C" letter-spacing="1">MULTI-AGENT</text>
        <text x="550" y="520" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#8A8578">fork / swarm</text>

        <rect x="780" y="460" width="180" height="80" rx="3" stroke="#1A6B5C" stroke-width="1.2" fill="#F0EDE6"/>
        <text x="870" y="498" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#1A6B5C" letter-spacing="1">EXTENSIONS</text>
        <text x="870" y="520" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#8A8578">MCP / Skills</text>

        <!-- Connection lines from modules to LLM -->
        <!-- Top row down -->
        <line x1="230" y1="160" x2="230" y2="200" stroke="#E0DDD6" stroke-width="1"/>
        <line x1="230" y1="200" x2="430" y2="280" stroke="#E0DDD6" stroke-width="1"/>

        <line x1="550" y1="160" x2="550" y2="220" stroke="#E0DDD6" stroke-width="1"/>

        <line x1="870" y1="160" x2="870" y2="200" stroke="#E0DDD6" stroke-width="1"/>
        <line x1="870" y1="200" x2="670" y2="280" stroke="#E0DDD6" stroke-width="1"/>

        <!-- Bottom row up -->
        <line x1="230" y1="460" x2="230" y2="420" stroke="#E0DDD6" stroke-width="1"/>
        <line x1="230" y1="420" x2="430" y2="340" stroke="#E0DDD6" stroke-width="1"/>

        <line x1="550" y1="460" x2="550" y2="400" stroke="#E0DDD6" stroke-width="1"/>

        <line x1="870" y1="460" x2="870" y2="420" stroke="#E0DDD6" stroke-width="1"/>
        <line x1="870" y1="420" x2="670" y2="340" stroke="#E0DDD6" stroke-width="1"/>

        <!-- Agent Loop arrow (circular) -->
        <path d="M 380 310 C 320 310, 300 250, 340 200 C 380 150, 440 140, 500 160"
              stroke="#B8510D" stroke-width="1.2" fill="none" stroke-dasharray="4 3"/>
        <path d="M 720 310 C 780 310, 800 370, 760 420 C 720 470, 660 480, 600 460"
              stroke="#B8510D" stroke-width="1.2" fill="none" stroke-dasharray="4 3"/>

        <!-- Loop label -->
        <text x="280" y="270" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#B8510D" letter-spacing="1">AGENT</text>
        <text x="280" y="285" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#B8510D" letter-spacing="1">LOOP</text>

        <!-- Small dots at connection points -->
        <circle cx="550" cy="220" r="3" fill="#1A1A18"/>
        <circle cx="550" cy="400" r="3" fill="#1A1A18"/>
        <circle cx="430" cy="280" r="3" fill="#1A1A18"/>
        <circle cx="670" cy="280" r="3" fill="#1A1A18"/>
        <circle cx="430" cy="340" r="3" fill="#1A1A18"/>
        <circle cx="670" cy="340" r="3" fill="#1A1A18"/>
      </svg>
    </div>
  </div>

  <!-- BOTTOM: Equation + metadata -->
  <div class="bottom">
    <div class="equation">
      <span class="eq-agent">Agent</span> = LLM + <span class="eq-harness">Harness</span>
    </div>
    <div class="tagline">
      LLM 提供推理能力，<strong>Harness</strong> 提供工具、权限、记忆、编排<br>
      这本书讲的就是 Harness 怎么造
    </div>
    <div class="meta-row">
      <div class="topics">
        <span class="topic">Agent Loop</span>
        <span class="topic">Tool System</span>
        <span class="topic">Permissions</span>
        <span class="topic">Multi-Agent</span>
        <span class="topic">MCP</span>
        <span class="topic">Memory</span>
        <span class="topic">Dream</span>
      </div>
      <div class="stats">
        <span class="num">22</span> chapters + <span class="num">4</span> appendices<br>
        <span class="num">8</span> parts · Harness Architecture
      </div>
    </div>
  </div>
</div>

</body>
</html>
