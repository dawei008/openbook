[book]
title = "OpenBook: AI Agent Harness Engineering"
authors = ["Dawei"]
description = "A comprehensive open-source book on building production-grade AI Agent Harnesses. 26 chapters covering Agent Loop, Tool Systems, Permission Models, Multi-Agent Orchestration, MCP Protocol, and Cloud Deployment."
language = "zh-CN"
src = "."

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/dawei008/openbook"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/dawei008/openbook/edit/main/{path}"
site-url = "/openbook/"
additional-css = []
additional-js = []
no-section-label = false

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-hierarchical-headings = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
